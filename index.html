<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    height: 100vh;
    background: url('bg.jpg') no-repeat center center/cover;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

/* Overlay */
.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.65);
}

/* Common container */
.container {
    position: relative;
    z-index: 2;
    text-align: center;
    color: white;
}

/* Title */
h1 {
    margin-bottom: 20px;
    font-weight: 500;
    letter-spacing: 2px;
}

/* Buttons */
.btn {
    padding: 15px 28px;
    margin: 10px;
    font-size: 20px;
    border: none;
    border-radius: 12px;
    background: white;
    color: black;
    cursor: pointer;
    transition: 0.3s ease;
}

.btn:hover {
    transform: scale(1.1);
    background: #ffccd5;
}

/* Hidden sections */
.hidden {
    display: none;
}

/* Shake for wrong number */
.shake {
    animation: shake 0.4s;
}

@keyframes shake {
    0% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    50% { transform: translateX(8px); }
    75% { transform: translateX(-8px); }
    100% { transform: translateX(0); }
}

/* Fade animations */
.fade-out {
    animation: fadeOut 1s forwards;
}

@keyframes fadeOut {
    to { opacity: 0; visibility: hidden; }
}

.fade-in {
    animation: fadeIn 1.5s forwards;
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

/* Video styling */
video {
    width: 85vw;
    max-width: 750px;
    border-radius: 18px;
    box-shadow: 0 0 25px rgba(255,255,255,0.2);
}

#replayBtn {
    margin-top: 20px;
    display: none;
}
</style>
</head>

<body>

<div class="overlay"></div>

<!-- 1️⃣ Intro Page -->
<div class="container" id="introPage">
    <h1>Yoo, story sathi template bhetli nhi mhanun😭😅</h1>
    <button class="btn" onclick="goToNumbers()">Chutta nhi hai, aage badh🤟🏽🤟🏽</button>
</div>

<!-- 2️⃣ Number Game -->
<div class="container hidden" id="numberGame">
    <h1>What's ur Birthdate?</h1>
    <button class="btn" onclick="checkNumber(10)">10</button>
    <button class="btn" onclick="checkNumber(16)">16</button>
    <button class="btn" onclick="checkNumber(22)">22</button>
</div>

<!-- 3️⃣ Video Section -->
<div class="container hidden" id="videoContainer">
    <video id="birthdayVideo">
        <source src="video.mp4" type="video/mp4">
    </video>
    <br>
    <button class="btn" id="replayBtn">Vaishnavi Khush Huyiii!</button>
</div>

<script>
function goToNumbers() {
    const intro = document.getElementById("introPage");
    intro.classList.add("fade-out");

    setTimeout(() => {
        intro.classList.add("hidden");
        const numbers = document.getElementById("numberGame");
        numbers.classList.remove("hidden");
        numbers.classList.add("fade-in");
    }, 1000);
}

function checkNumber(num) {
    const game = document.getElementById("numberGame");

    if (num === 16) {
        game.classList.add("fade-out");

        setTimeout(() => {
            game.classList.add("hidden");

            const videoContainer = document.getElementById("videoContainer");
            videoContainer.classList.remove("hidden");
            videoContainer.classList.add("fade-in");

            const video = document.getElementById("birthdayVideo");
            video.play();
        }, 1000);

    } else {
        game.classList.add("shake");
        setTimeout(() => game.classList.remove("shake"), 400);
    }
}

const video = document.getElementById("birthdayVideo");
const replayBtn = document.getElementById("replayBtn");

video.addEventListener("ended", function() {
    replayBtn.style.display = "inline-block";
});

replayBtn.addEventListener("click", function() {
    video.currentTime = 0;
    video.play();
    replayBtn.style.display = "none";
});
</script>

</body>
</html>
