<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    height: 100vh;
    background: url('bg.jpg') no-repeat center center/cover;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

/* Dark cinematic overlay */
.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.65);
}

/* Container */
.container {
    position: relative;
    z-index: 2;
    text-align: center;
    color: white;
}

/* Title */
h1 {
    margin-bottom: 20px;
    font-weight: 500;
    letter-spacing: 2px;
}

/* Number buttons */
.number-btn {
    padding: 15px 28px;
    margin: 10px;
    font-size: 22px;
    border: none;
    border-radius: 12px;
    background: white;
    color: black;
    cursor: pointer;
    transition: 0.3s ease;
}

.number-btn:hover {
    transform: scale(1.1);
    background: #ffccd5;
}

/* Shake animation for wrong choice */
.shake {
    animation: shake 0.4s;
}

@keyframes shake {
    0% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    50% { transform: translateX(8px); }
    75% { transform: translateX(-8px); }
    100% { transform: translateX(0); }
}

/* Fade animations */
.fade-out {
    animation: fadeOut 1s forwards;
}

@keyframes fadeOut {
    to { opacity: 0; visibility: hidden; }
}

.fade-in {
    animation: fadeIn 1.5s forwards;
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

/* Video Section */
#videoContainer {
    display: none;
}

video {
    width: 85vw;
    max-width: 750px;
    border-radius: 18px;
    box-shadow: 0 0 25px rgba(255,255,255,0.2);
}

/* Replay Button */
#replayBtn {
    margin-top: 20px;
    padding: 12px 25px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    background: white;
    color: black;
    cursor: pointer;
    display: none;
    transition: 0.3s ease;
}

#replayBtn:hover {
    background: #ffccd5;
    transform: scale(1.05);
}
</style>
</head>

<body>

<div class="overlay"></div>

<!-- Number Game -->
<div class="container" id="numberGame">
    <h1>Pick a Number</h1>
    <button class="number-btn" onclick="checkNumber(10)">10</button>
    <button class="number-btn" onclick="checkNumber(16)">16</button>
    <button class="number-btn" onclick="checkNumber(22)">22</button>
</div>

<!-- Video Section -->
<div class="container" id="videoContainer">
    <video id="birthdayVideo">
        <source src="video.mp4" type="video/mp4">
        Your browser does not support video.
    </video>
    <br>
    <button id="replayBtn">Replay 🎥</button>
</div>

<script>
function checkNumber(num) {
    const game = document.getElementById("numberGame");

    if (num === 16) {
        game.classList.add("fade-out");

        setTimeout(() => {
            game.style.display = "none";

            const videoContainer = document.getElementById("videoContainer");
            videoContainer.style.display = "block";
            videoContainer.classList.add("fade-in");

            const video = document.getElementById("birthdayVideo");
            video.play();
        }, 1000);

    } else {
        game.classList.add("shake");
        setTimeout(() => game.classList.remove("shake"), 400);
    }
}

const video = document.getElementById("birthdayVideo");
const replayBtn = document.getElementById("replayBtn");

video.addEventListener("ended", function() {
    replayBtn.style.display = "inline-block";
});

replayBtn.addEventListener("click", function() {
    video.currentTime = 0;
    video.play();
    replayBtn.style.display = "none";
});
</script>

</body>
</html>
