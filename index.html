<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise 🎂</title>

<style>
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  text-align:center;
  background:url("bg.jpg") no-repeat center center fixed;
  background-size:cover;
  color:white;
  overflow:hidden;
}

.screen{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  backdrop-filter:brightness(0.7);
}

.hidden{
  display:none;
}

h1{
  font-size:2.5rem;
  margin-bottom:20px;
}

button{
  padding:12px 25px;
  font-size:1.2rem;
  border:none;
  border-radius:8px;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.1);
}

.number-btn{
  margin:10px;
  width:80px;
  height:80px;
  font-size:1.8rem;
  border-radius:50%;
}

.fade-in{
  animation:fadeIn 0.6s ease forwards;
}

@keyframes fadeIn{
  from{opacity:0; transform:scale(0.96);}
  to{opacity:1; transform:scale(1);}
}

.glow{
  box-shadow:0 0 25px gold;
  transform:scale(1.15);
}

.message{
  font-size:1.2rem;
  margin-bottom:15px;
}

/* NEW ANIMATION STYLES */

#henScene{
  position:absolute;
  bottom:80px;
  width:100%;
  height:300px;
  pointer-events:none;
}

#hen{
  position:absolute;
  bottom:0;
  left:50%;
  transform:translateX(-50%);
  width:120px;
  transition:transform 2s linear;
}

#egg{
  position:absolute;
  width:35px;
  left:50%;
  bottom:90px;
  transform:translateX(-50%);
  transition:bottom 1s ease;
}

#eggLeft,#eggRight{
  position:absolute;
  width:35px;
  left:50%;
  bottom:40px;
  transform:translateX(-50%);
  opacity:0;
}

#eggLeft{
  clip-path:inset(0 50% 0 0);
}

#eggRight{
  clip-path:inset(0 0 0 50%);
}

.splitLeft{
  animation:splitLeft 1s forwards;
}

.splitRight{
  animation:splitRight 1s forwards;
}

@keyframes splitLeft{
  to{transform:translate(-80px,0); opacity:1;}
}

@keyframes splitRight{
  to{transform:translate(80px,0); opacity:1;}
}

.shake{
  animation:eggShake 0.6s infinite alternate;
}

@keyframes eggShake{
  from{transform:translateX(-50%) rotate(-5deg);}
  to{transform:translateX(-50%) rotate(5deg);}
}
</style>
</head>

<body>

<!-- INTRO SCREEN -->
<div id="intro" class="screen">
  <h1>Yooo, story lavtaa nhi aali mhanun...</h1>
  <p>Pick the number that holds the magic...</p>
  <button onclick="goToGame()">Chalo</button>
</div>

<!-- GAME SCREEN -->
<div id="game" class="screen hidden">
  <h1>Choose wiselyyy</h1>
  <div>
    <button class="number-btn" onclick="checkNumber(16)">16</button>
    <button class="number-btn" onclick="checkNumber(3)">3</button>
    <button class="number-btn" onclick="checkNumber(10)">10</button>
  </div>
</div>

<!-- WRONG SCREEN -->
<div id="wrong" class="screen hidden">
  <h1 id="wrongText">Khallessss? Ha nvtaa yrr</h1>
  <button onclick="retry()">Ajun ekdaa</button>
</div>

<!-- HEN ANIMATION SCENE -->
<div id="henScene" class="hidden">
  <img id="hen" src="hen.png">
  <img id="egg" src="egg.png">
  <img id="eggLeft" src="egg.png">
  <img id="eggRight" src="egg.png">
</div>

<!-- VIDEO SCREEN -->
<div id="videoScreen" class="screen hidden">
  <h1>🎂 Happy Birthday 🎂</h1>
  <video id="birthdayVideo" width="320" controls>
    <source src="video.mp4" type="video/mp4">
  </video>
  <br><br>
  <button id="replayBtn" class="hidden" onclick="replayVideo()">Vaishnavi Khush Huyee✨</button>
</div>

<script>
const intro = document.getElementById("intro");
const game = document.getElementById("game");
const wrong = document.getElementById("wrong");
const videoScreen = document.getElementById("videoScreen");
const video = document.getElementById("birthdayVideo");
const replayBtn = document.getElementById("replayBtn");
const wrongText = document.getElementById("wrongText");

const henScene = document.getElementById("henScene");
const hen = document.getElementById("hen");
const egg = document.getElementById("egg");
const eggLeft = document.getElementById("eggLeft");
const eggRight = document.getElementById("eggRight");

const wrongMessages = [
  "Ajun ek wrong decision in life!",
  "So close yet so far!",
  "Nice guess 🎯 but not the magical spark!",
  "Not quite 🎈 Try listening to your heart."
];

function switchScreen(from, to){
  from.classList.add("hidden");
  to.classList.remove("hidden");
  to.classList.add("fade-in");
}

function goToGame(){
  switchScreen(intro, game);
}

function checkNumber(num){
  if(num === 16){

    const buttons = document.querySelectorAll(".number-btn");
    buttons.forEach(btn=>{
      if(parseInt(btn.innerText) === 16){
        btn.classList.add("glow");
      }
    });

    setTimeout(()=>{
      game.classList.add("hidden");
      startHenAnimation();
    },700);

  }else{
    const msg = wrongMessages[Math.floor(Math.random() * wrongMessages.length)];
    wrongText.innerHTML = `Areh🤦🏽<br>${msg}`;
    switchScreen(game, wrong);
  }
}

function retry(){
  switchScreen(wrong, game);
}

/* HEN + EGG ANIMATION */

function startHenAnimation(){

  henScene.classList.remove("hidden");

  setTimeout(()=>{
    egg.style.bottom="40px";
  },800);

  setTimeout(()=>{
    hen.style.transform="translateX(400px)";
  },1500);

  setTimeout(()=>{
    egg.classList.add("shake");
  },2000);

  setTimeout(()=>{
    egg.style.opacity="0";
    eggLeft.classList.add("splitLeft");
    eggRight.classList.add("splitRight");
  },3000);

  setTimeout(()=>{
    henScene.classList.add("hidden");
    switchScreen(game, videoScreen);
    video.play();
  },4000);

}

video.addEventListener("ended", function(){
  replayBtn.classList.remove("hidden");
});

function replayVideo(){
  replayBtn.classList.add("hidden");
  video.currentTime = 0;
  video.play();
}
</script>

</body>
</html>
